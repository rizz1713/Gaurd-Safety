<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-Powered Industrial Safety Intelligence Command Center" />
    <title>GuardSafety AI — Industrial Safety Intelligence</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Top Header -->
      <header class="app-header">
        <div class="header-brand">
          <div class="brand-logo">G</div>
          <div>
            <h1 class="brand-title">GuardSafety AI</h1>
            <p style="font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 1.5px;">COMMAND LAYER v1.0.0</p>
          </div>
        </div>

        <div class="header-status-bar">
          <!-- Live Time -->
          <div style="font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px;" id="current-clock">
            16:05:00
          </div>
          
          <!-- System Status Badge -->
          <div id="system-status-badge" class="status-badge safe">
            <span class="status-indicator-dot"></span>
            <span id="system-status-text">SYSTEM SAFE</span>
          </div>

          <!-- Compound Risk Indicator -->
          <div style="display: flex; align-items: center; gap: 10px; border-left: 1px solid var(--border-color); padding-left: 16px;">
            <span style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-family: var(--font-mono); letter-spacing: 1px;">RISK:</span>
            <span id="head-risk-score" style="font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--color-success);">08%</span>
          </div>
        </div>

        <!-- Quick Emergency Actions -->
        <div class="header-actions">
          <button id="btn-quick-leak" class="btn" style="border-color: var(--color-warning); color: var(--color-warning);">⚠️ SIMULATE GAS LEAK</button>
          <button id="btn-quick-fan" class="btn" style="border-color: var(--color-danger); color: var(--color-danger);">💨 FAN FAILURE</button>
          <button id="btn-trigger-alarm" class="btn btn-danger">🚨 EVACUATE PLANT</button>
          <button id="btn-reset-sim" class="btn">🔄 RESET</button>
        </div>
      </header>

      <!-- Left Sidebar Navigation -->
      <aside class="app-sidebar">
        <nav class="nav-menu">
          <div class="nav-item active" data-tab="dashboard" id="nav-dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
            </svg>
            Command Center
          </div>

          <div class="nav-item" data-tab="heatmap" id="nav-heatmap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
            </svg>
            Safety Heatmap
          </div>

          <div class="nav-item" data-tab="permits" id="nav-permits">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Permit Intelligence
          </div>

          <div class="nav-item" data-tab="rag" id="nav-rag">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
            Regulatory RAG
          </div>

          <div class="nav-item" data-tab="emergency" id="nav-emergency">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            Emergency Hub
          </div>

          <div class="nav-item" data-tab="compliance" id="nav-compliance">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
            Compliance & Audit
          </div>

          <div class="nav-item" data-tab="architecture" id="nav-architecture">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            System Architecture
          </div>


        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-footer-text">SECURE LINK CONFIRMED</div>
          <div class="sidebar-footer-text" style="color: var(--color-success);">● ON-LINE ENCRYPTED</div>
        </div>
      </aside>

      <!-- Main Display -->
      <main class="app-viewport" id="app-viewport">
        <!-- Content gets loaded here dynamically via JS -->
      </main>
    </div>

    <!-- App Entry Javascript -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
